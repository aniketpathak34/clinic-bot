version: '3.8'

# Lightweight dev setup — SQLite + Redis only
services:
  web:
    build: .
    container_name: clinic_bot_dev
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=True
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    container_name: clinic_bot_redis_dev
    ports:
      - "6380:6379"

  celery_worker:
    build: .
    container_name: clinic_bot_celery_dev
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - .:/app
