<?xml version="1.0" encoding="UTF-8"?>
<!--
  V2-D — "MS Mark" (Notion / Anthropic / Asana vibe)
  Custom monogram "MS" rendered as overlapping bold geometry. Sharp,
  confident, ownable. Works as a 16px favicon and as a standalone mark.
  No flourishes — pure brand letter shape.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#0a0a0f"/>

  <!-- The "M" — three thick verticals + two diagonals, geometric -->
  <g fill="#fafafa">
    <!-- Left vertical of M -->
    <rect x="232" y="280" width="64" height="464" rx="16"/>
    <!-- Right vertical of M -->
    <rect x="496" y="280" width="64" height="464" rx="16"/>
    <!-- Left diagonal of M -->
    <path d="M 296 280
             L 360 280
             L 460 480
             L 396 480 Z"/>
    <!-- Right diagonal of M -->
    <path d="M 432 280
             L 496 280
             L 460 480
             L 396 480 Z"/>
  </g>

  <!-- The "S" in cyan, slightly overlapping the M -->
  <g fill="#22d3ee">
    <!-- Top bar of S -->
    <rect x="568" y="280" width="224" height="64" rx="32"/>
    <!-- Right vertical (top half) — connecting top to middle -->
    <rect x="728" y="312" width="64" height="172" rx="20"/>
    <!-- Middle bar of S -->
    <rect x="568" y="484" width="224" height="64" rx="32"/>
    <!-- Left vertical (bottom half) — connecting middle to bottom -->
    <rect x="568" y="516" width="64" height="172" rx="20"/>
    <!-- Bottom bar of S -->
    <rect x="568" y="680" width="224" height="64" rx="32"/>
  </g>
</svg>
