<?xml version="1.0" encoding="UTF-8"?>
<!--
  DocPing — wordmark (same style as the MediSetu wordmark that was liked).
  "Doc" in light, "Ping" in cyan accent, Inter Black, tight tracking.
  Underline accent below.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1024 1024" width="1024" height="1024"
     role="img" aria-label="DocPing">
  <rect width="1024" height="1024" rx="200" fill="#0a0a0f"/>

  <g font-family="Inter, system-ui, -apple-system, sans-serif"
     font-weight="900"
     letter-spacing="-12"
     text-anchor="middle">
    <!-- "doc" line -->
    <text x="512" y="488" font-size="220" fill="#fafafa">doc</text>
    <!-- "ping" line in cyan -->
    <text x="512" y="708" font-size="220" fill="#22d3ee">ping</text>
  </g>

  <!-- Cyan underline accent -->
  <rect x="446" y="780" width="132" height="6" rx="3" fill="#22d3ee" opacity="0.6"/>
</svg>
