<?xml version="1.0" encoding="UTF-8"?>
<!--
  V2-A — "Pure wordmark" (Stripe / Substack / Linear approach)
  No icon mark. The wordmark IS the logo.
  "Medi" in white, "Setu" in cyan to highlight the brand-distinctive part.
  Custom Inter Black, tight tracking, modern SaaS confidence.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="#0a0a0f"/>

  <g font-family="Inter, system-ui, -apple-system, sans-serif"
     font-weight="900"
     letter-spacing="-12"
     text-anchor="middle">
    <!-- "medi" line -->
    <text x="512" y="488" font-size="220" fill="#fafafa">medi</text>
    <!-- "setu" line in cyan -->
    <text x="512" y="708" font-size="220" fill="#22d3ee">setu</text>
  </g>

  <!-- Subtle accent: a tiny cyan dot replacing the dot of the i (lowercase) -->
  <!-- Optional: a single underline dash beneath as a brand mark -->
  <rect x="446" y="780" width="132" height="6" rx="3" fill="#22d3ee" opacity="0.6"/>
</svg>
