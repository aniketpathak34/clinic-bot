version: '3.8'

# Production setup — uses pre-built image from Docker Hub
services:
  web:
    image: ${DOCKER_IMAGE:-aniketpathak34/clinic-bot:latest}
    container_name: clinic_bot_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 120"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: clinic_bot_redis
    restart: always
    volumes:
      - redis_data:/data

  celery_worker:
    image: ${DOCKER_IMAGE:-aniketpathak34/clinic-bot:latest}
    container_name: clinic_bot_celery
    restart: always
    command: celery -A config worker -l info --concurrency=1
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  celery_beat:
    image: ${DOCKER_IMAGE:-aniketpathak34/clinic-bot:latest}
    container_name: clinic_bot_beat
    restart: always
    command: celery -A config beat -l info
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: clinic_bot_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  redis_data:
