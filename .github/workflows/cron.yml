# GitHub Actions cron — fires our scheduled tasks by POST-ing to the Render
# web service. Replaces Celery beat + worker (which Render's free tier no
# longer supports).
#
# How this works:
#   1. GitHub runs jobs on a cron schedule (UTC).
#   2. Each job uses curl to POST to /webhook/cron/<CRON_SECRET>/<task>/
#   3. The Django view (apps/notifications/views.py) verifies the secret
#      and runs the task synchronously, then returns a JSON result.
#
# ─── Schedule overview (visible in the GitHub Actions tab as past runs) ──
#   ┌────────────────────────────┬──────────────┬─────────┐
#   │ Job                        │ When (IST)   │ Cron UTC│
#   ├────────────────────────────┼──────────────┼─────────┤
#   │ daily-leadgen              │ 09:00 daily  │ 30 3    │
#   │ day-reminders              │ 18:00 daily  │ 30 12   │
#   └────────────────────────────┴──────────────┴─────────┘
#
# ─── Manual triggering (from this Actions tab) ──────────────────────────
#   Click "Run workflow" at the top right of the workflow page, pick which
#   task to run from the dropdown, and click the green button. Useful for
#   testing or firing a one-off without waiting for the schedule.
#
# ─── Setup needed (one-time) ────────────────────────────────────────────
#   • Repo Settings → Secrets and variables → Actions → New repository SECRET
#       → Name:  CRON_SECRET
#       → Value: <same string you set in Render env vars>
#   • Repo Settings → Secrets and variables → Actions → Variables tab →
#     New repository VARIABLE
#       → Name:  RENDER_BASE_URL
#       → Value: https://clinic-bot-web.onrender.com   (no trailing slash)
#
# ─── Free tier note (current schedule) ──────────────────────────────────
#   • daily-leadgen  → 30 runs/month → 30 min/mo
#   • day-reminders  → 30 runs/month → 30 min/mo
#   • Manual runs   → only when you click — ~0 min/mo
#   • TOTAL: ~60 min/month   (free tier private repo cap = 2,000 min/mo)
#   → Comfortably free, zero billing risk.
#
# ─── On-demand via browser (no GitHub at all) ───────────────────────────
#   You can also trigger any task by just visiting the webhook URL:
#     https://clinic-bot-web.onrender.com/webhook/cron/<CRON_SECRET>/<task>/
#   The view accepts both GET and POST.

name: Scheduled Tasks

on:
  # ── Automatic schedules (UTC) ─────────────────────────────────────────
  schedule:
    - cron: '30 3 * * *'        # 09:00 IST daily — lead-gen
    - cron: '30 12 * * *'       # 18:00 IST daily — day-before reminders

  # ── Manual trigger from the Actions tab ───────────────────────────────
  # Pick which task to run from the "task" dropdown, then click "Run workflow".
  workflow_dispatch:
    inputs:
      task:
        description: 'Which task to run'
        required: true
        default: 'fetch_daily_leads'
        type: choice
        options:
          - fetch_daily_leads
          - send_day_before_reminders


jobs:
  # ─── 09:00 IST daily: pull fresh leads from Google Places ─────────────
  daily-leadgen:
    name: Daily lead-gen (09:00 IST)
    if: github.event.schedule == '30 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: POST fetch_daily_leads
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # --max-time 120 leaves room for Render cold-start (~30s) plus the
          # Google Places API roundtrip (a few seconds per query × ~8 queries).
          curl --fail --show-error --silent --max-time 120 \
            -X POST \
            "${BASE_URL}/webhook/cron/${SECRET}/fetch_daily_leads/"

  # ─── 18:00 IST daily: tomorrow's appointment reminders ────────────────
  day-reminders:
    name: Day-before reminders (18:00 IST)
    if: github.event.schedule == '30 12 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: POST send_day_before_reminders
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent --max-time 90 \
            -X POST \
            "${BASE_URL}/webhook/cron/${SECRET}/send_day_before_reminders/"

  # ─── Manual trigger — runs whichever task was picked from the UI ──────
  manual:
    name: Manual run — ${{ inputs.task }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: POST ${{ inputs.task }}
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
          TASK: ${{ inputs.task }}
        run: |
          echo "Triggering task: ${TASK}"
          curl --fail --show-error --silent --max-time 120 \
            -X POST \
            "${BASE_URL}/webhook/cron/${SECRET}/${TASK}/"
