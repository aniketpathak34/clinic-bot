name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: opc
          key: ${{ secrets.ORACLE_SSH_KEY }}
          envs: DJANGO_SECRET_KEY,GROQ_API_KEY,MSG91_AUTH_KEY,MSG91_INTEGRATED_NUMBER
          script: |
            # Clone or pull latest
            cd ~/clinic-bot || git clone https://github.com/aniketpathak34/clinic-bot.git ~/clinic-bot
            cd ~/clinic-bot
            git pull origin main

            # Create .env file
            cat > .env << ENVEOF
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DEBUG=False
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            MSG91_AUTH_KEY=${{ secrets.MSG91_AUTH_KEY }}
            MSG91_INTEGRATED_NUMBER=${{ secrets.MSG91_INTEGRATED_NUMBER }}
            MSG91_IVR_FLOW_ID=
            WHATSAPP_SERVICE_CLASS=apps.whatsapp.msg91_service.MSG91WhatsAppService
            WHATSAPP_VERIFY_TOKEN=clinic-bot-verify
            CALL_SERVICE_CLASS=apps.notifications.call_service.MockCallService
            CELERY_BROKER_URL=redis://redis:6379/0
            ENVEOF

            # Build and deploy
            docker compose -f docker-compose.prod.yml up -d --build

            # Create admin user if not exists
            docker exec clinic_bot_web python manage.py shell -c "
            from django.contrib.auth.models import User
            if not User.objects.filter(username='admin').exists():
                User.objects.create_superuser('admin', 'admin@admin.com', 'admin')
            " 2>/dev/null || true

            echo "✅ Deployed successfully"
