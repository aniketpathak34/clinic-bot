version: '3.8'

services:
  web:
    build: .
    container_name: clinic_bot_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://clinic_bot:clinic_bot@db:5432/clinic_bot
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: clinic_bot_db
    environment:
      POSTGRES_DB: clinic_bot
      POSTGRES_USER: clinic_bot
      POSTGRES_PASSWORD: clinic_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: clinic_bot_redis
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: clinic_bot_celery
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db
    volumes:
      - .:/app
    restart: unless-stopped

  celery_beat:
    build: .
    container_name: clinic_bot_beat
    command: celery -A config beat -l info
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
